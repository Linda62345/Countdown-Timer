<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>14分鐘 倒數計時器</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #000000; 
            color: #ffffff;
            margin: 0; 
            overflow: hidden;
        }
        .time { 
            /* 使用 min(vw, vh) 讓文字在任何設備都能完美填滿畫面且不產生捲軸 */
            font-size: min(28vw, 40vh); 
            font-weight: bold; 
            font-variant-numeric: tabular-nums;
            color: #61afef;
            line-height: 1;
            text-align: center;
        }
        .controls {
            position: absolute;
            bottom: 5vh;
            opacity: 0.1;
            transition: opacity 0.3s;
            display: flex;
            gap: 15px;
            flex-wrap: wrap; /* 空間不足時自動換行 */
            justify-content: center;
        }
        .controls:hover {
            opacity: 1;
        }
        button { 
            padding: 12px 25px; 
            font-size: 20px; 
            cursor: pointer; 
            border: none; 
            border-radius: 8px; 
            background-color: #98c379; 
            color: #282c34; 
            font-weight: bold;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3); /* 增加按鈕質感 */
        }
        button:hover { 
            background-color: #7cb359; 
        }
        button:active {
            transform: scale(0.95); /* 點擊時內縮效果 */
        }
        .btn-pause {
            background-color: #e5c07b;
        }
        .btn-pause:hover {
            background-color: #d19a66;
        }
        .btn-reset {
            background-color: #e06c75;
        }
        .btn-reset:hover {
            background-color: #be5046;
        }

        /* 手機/小螢幕的響應式設定 */
        @media screen and (max-width: 768px) {
            .time {
                font-size: 25vw; /* 讓手機有足夠清楚的字體 */
            }
            .controls {
                opacity: 0.8; /* 手機沒有 hover，預設就顯示一部分的透明度 */
                bottom: 25px;
                gap: 10px;
            }
            button {
                padding: 10px 20px; 
                font-size: 16px; /* 按鈕稍微縮小 */
            }
        }
    </style>
    <!-- 引入 NoSleep.js 來支援 iPad/iOS 保持螢幕喚醒 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
</head>
<body>
    <div class="time" id="timeDisplay">14:00</div>
    <div class="controls">
        <button onclick="startTimer()">開始</button>
        <button class="btn-pause" onclick="pauseTimer()">暫停</button>
        <button class="btn-reset" onclick="resetTimer()">重設</button>
    </div>

    <script>
        const TOTAL_MINUTES = 14; // 總時間設為 14 分鐘
        const ALERT_MINUTES = 2; // 剩下 2 分鐘時響鈴

        let timeLeft = TOTAL_MINUTES * 60;
        let timerInterval = null;
        
        // 初始化 NoSleep (解決 iPad/iOS 不支援原生 wakeLock 的問題)
        const noSleep = new NoSleep();

        const timeDisplay = document.getElementById('timeDisplay');
        let alertAudioElement = null; // 負責播放警鈴的 Audio 元素
        let keepAliveAudio = null; // 負責無限循環播放無聲音訊，保持「媒體播放」Session 不斷線
        const SILENT_WAV = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA";

        // 動態生成原有的警報音，並轉換為 WAV Blob 檔案 (轉換為 HTML Audio 元素播放，能強行突破硬體靜音開關，並隨音量變大變小)
        function generateAlertWavUrl() {
            const sampleRate = 44100;
            const duration = 3; 
            const numSamples = sampleRate * duration;
            const buffer = new ArrayBuffer(44 + numSamples * 2);
            const view = new DataView(buffer);

            const writeString = (view, offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + numSamples * 2, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(view, 36, 'data');
            view.setUint32(40, numSamples * 2, true);

            let offset = 44;
            let phase = 0;
            
            for (let i = 0; i < numSamples; i++) {
                const time = i / sampleRate;
                const lfo = Math.sin(2 * Math.PI * 6 * time) >= 0 ? 1 : -1;
                const freq = 800 + lfo * 400;
                
                phase += freq / sampleRate;
                if (phase > 1) phase -= 1;
                const osc = 2 * phase - 1;
                
                let env = 1;
                if (time < 0.1) {
                    env = time / 0.1; 
                } else if (time >= 2.5) {
                    const fadeTime = time - 2.5;
                    env = Math.pow(0.01, fadeTime / 0.5); 
                }

                const volume = 0.5;
                const sample = osc * env * volume;
                const intSample = Math.max(-32768, Math.min(32767, sample * 32768));
                
                view.setInt16(offset, intSample, true);
                offset += 2;
            }

            return URL.createObjectURL(new Blob([view], { type: 'audio/wav' }));
        }

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = Math.floor(timeLeft % 60);
            timeDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // 倒數最後兩分鐘時可以改變顏色提醒
            if (timeLeft <= ALERT_MINUTES * 60 && timeLeft > 0) {
                timeDisplay.style.color = '#e5c07b';
            } else if (timeLeft === 0) {
                timeDisplay.style.color = '#e06c75';
            } else {
                timeDisplay.style.color = '#61afef';
            }
        }

        // 以媒體 API 來播放音訊就能隨系統音量大小響，繞過實體靜音開關
        function playAlert() {
            if (alertAudioElement) {
                alertAudioElement.currentTime = 0;
                alertAudioElement.play().catch(e => console.warn('播放警報音失敗:', e));
            }
        }

        function startTimer() {
            if (timerInterval) return; // 避免重複啟動
            
            // 啟用螢幕常亮 (必須在使用者點擊事件中呼叫)
            noSleep.enable();

            // 利用保持系統進入「媒體播放」權限的方式，破解 iOS 的靜音模式限制
            if (!keepAliveAudio) {
                // 1. 建立一個循環播放的靜音任務，騙過系統將目前網頁強制切為「媒體撥放」狀態，維持連線不會斷
                keepAliveAudio = new Audio(SILENT_WAV);
                keepAliveAudio.loop = true;
                keepAliveAudio.play().catch(e => console.warn(e));

                // 2. 準備剛剛產生的響鈴，同時觸發一次 play/pause 以取得該元素在 iOS 下的互動權限
                alertAudioElement = new Audio(generateAlertWavUrl());
                alertAudioElement.play().then(() => {
                    alertAudioElement.pause();
                    alertAudioElement.currentTime = 0;
                }).catch(e => console.warn(e));
            } else {
                // 若暫停過後再開始，則確保靜音保持連線重新啟動
                keepAliveAudio.play().catch(e => console.warn(e));
            }

            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateDisplay();
                    
                    // 經過 12 分鐘 (剩下 2 分鐘) 時響鈴
                    if (timeLeft === ALERT_MINUTES * 60) {
                        playAlert();
                    }
                } else {
                    // 14 分鐘結束，再次響鈴並重置循環
                    playAlert();
                    resetTimer();
                    startTimer(); // 自動重新開始下一個 14 分鐘循環
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            noSleep.disable(); // 暫停時允許螢幕關閉
            if (keepAliveAudio) keepAliveAudio.pause(); // 順便停止播放背景靜音
        }

        function resetTimer() {
            pauseTimer();
            timeLeft = TOTAL_MINUTES * 60;
            updateDisplay();
        }

        // 初始化顯示
        updateDisplay();
    </script>
</body>
</html>
